<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{app_name}} ID</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%230077FF'/%3E%3Cpath d='M17.1 22.4c-5.8 0-9.1-4-9.2-10.6h2.9c.1 4.8 2.2 6.9 3.9 7.3V11.8h2.7v4.2c1.7-.2 3.4-2 4-4.2h2.7c-.4 2.7-2.4 4.5-3.7 5.3 1.3.6 3.6 2.2 4.4 5.3h-3c-.6-2-2.2-3.6-4.4-3.8v3.8h-.3z' fill='%23fff'/%3E%3C/svg%3E">
</head>
<body>
    <div class="app">
        <div class="auth-page">
            <div class="auth-container">
                <!-- VK ID Logo -->
                <div class="auth-logo">
                    <svg viewBox="0 0 126 26" width="126" height="26" fill="none">
                        <path d="M0 12.6C0 6.2 3 3 9.3 3h7.4C23 3 26 6.2 26 12.6v.8C26 19.8 23 23 16.7 23H9.3C3 23 0 19.8 0 13.4v-.8zm7.2.7c0 3.8 1.2 5 3.9 5h3.8c2.7 0 3.9-1.2 3.9-5v-.6c0-3.8-1.2-5-3.9-5h-3.8c-2.7 0-3.9 1.2-3.9 5v.6z" fill="#0077FF"/>
                        <path d="M42.6 3h5.8L53.1 14 57.8 3h5.8L55.3 23H51L42.6 3z" fill="#0077FF"/>
                        <path d="M67 3h5.4v20H67V3z" fill="#0077FF"/>
                        <path d="M77.3 3h9.2c5.3 0 8.4 2.5 8.4 7.2 0 4.6-3.1 7.2-8.4 7.2h-3.8V23H77.3V3zm5.4 10h3.5c2.2 0 3.3-.9 3.3-2.8s-1.1-2.8-3.3-2.8h-3.5v5.6z" fill="#0077FF"/>
                        <path fill="#0077FF" d="M102.5 3h18.2v4.4h-6.4V23h-5.4V7.4h-6.4V3z"/>
                    </svg>
                </div>

                <!-- Sign in heading -->
                <h1 class="auth-title">Вход в аккаунт</h1>
                <p class="auth-subtitle">Введите номер телефона или email, чтобы войти или зарегистрироваться</p>

                <!-- Login form -->
                <form id="login-form" method="post" action="">
                    <div class="form-field">
                        <div class="input-group" id="phone-group">
                            <div class="country-code">
                                <span class="flag">🇷🇺</span>
                                <span class="code">+7</span>
                                <svg width="12" height="12" viewBox="0 0 12 12" fill="currentColor"><path d="M3 4.5l3 3 3-3"/></svg>
                            </div>
                            <input type="tel" id="phone" name="phone" placeholder="Телефон" autocomplete="tel" autofocus>
                        </div>
                    </div>

                    <button type="submit" class="btn-primary" id="submit-btn">
                        <span>Продолжить</span>
                        <div class="btn-spinner" style="display:none"></div>
                    </button>
                </form>

                <!-- Alternative sign-in -->
                <div class="alt-signin">
                    <button type="button" class="btn-alt" id="email-toggle">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                        <span>Войти по почте</span>
                    </button>
                </div>

                <!-- Social login -->
                <div class="social-login">
                    <p class="social-title">Войти через</p>
                    <div class="social-buttons">
                        <button type="button" class="social-btn" title="Google">
                            <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                        </button>
                        <button type="button" class="social-btn" title="OK">
                            <svg width="20" height="20" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4" fill="#EE8208"/><path fill="#EE8208" d="M16.4 14.2c-.6.6-1.3 1-2.1 1.3l2.4 2.4c.5.5.5 1.3 0 1.8-.5.5-1.3.5-1.8 0L12 16.8l-2.9 2.9c-.5.5-1.3.5-1.8 0-.5-.5-.5-1.3 0-1.8l2.4-2.4c-.8-.3-1.5-.7-2.1-1.3-.5-.5-.5-1.3 0-1.8.5-.5 1.3-.5 1.8 0 1.4 1.4 3.8 1.4 5.2 0 .5-.5 1.3-.5 1.8 0 .5.5.5 1.3 0 1.8z"/></svg>
                        </button>
                        <button type="button" class="social-btn" title="Mail.ru">
                            <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#005FF9" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10h5v-2h-5c-4.34 0-8-3.66-8-8s3.66-8 8-8 8 3.66 8 8v1.43c0 .79-.71 1.57-1.5 1.57s-1.5-.78-1.5-1.57V12c0-2.76-2.24-5-5-5s-5 2.24-5 5 2.24 5 5 5c1.38 0 2.64-.56 3.54-1.47.65.89 1.77 1.47 2.96 1.47 1.97 0 3.5-1.6 3.5-3.57V12c0-5.52-4.48-10-10-10zm0 13c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3z"/></svg>
                        </button>
                    </div>
                </div>

                <!-- Terms -->
                <div class="terms">
                    <p>Нажимая «Продолжить», вы принимаете <a href="#">пользовательское соглашение</a> и <a href="#">политику конфиденциальности</a></p>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <footer class="page-footer">
            <div class="footer-links">
                <a href="#">Помощь</a>
                <span class="dot">·</span>
                <a href="#">Разработчикам</a>
                <span class="dot">·</span>
                <a href="#">О компании</a>
            </div>
            <div class="footer-lang">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                <span>Русский</span>
            </div>
        </footer>
    </div>

    <script>
    (function(){
        var form = document.getElementById('login-form');
        var btn = document.getElementById('submit-btn');
        var emailToggle = document.getElementById('email-toggle');
        var phoneGroup = document.getElementById('phone-group');
        var phoneInput = document.getElementById('phone');
        var isEmail = false;

        emailToggle.addEventListener('click', function(){
            isEmail = !isEmail;
            if(isEmail){
                phoneGroup.innerHTML = '<input type="email" id="phone" name="email" placeholder="Email" autocomplete="email" style="width:100%">';
                emailToggle.querySelector('span').textContent = 'Войти по телефону';
                emailToggle.querySelector('svg').innerHTML = '<path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>';
            } else {
                phoneGroup.innerHTML = '<div class="country-code"><span class="flag">\uD83C\uDDF7\uD83C\uDDFA</span><span class="code">+7</span><svg width="12" height="12" viewBox="0 0 12 12" fill="currentColor"><path d="M3 4.5l3 3 3-3"/></svg></div><input type="tel" id="phone" name="phone" placeholder="\u0422\u0435\u043b\u0435\u0444\u043e\u043d" autocomplete="tel">';
                emailToggle.querySelector('span').textContent = 'Войти по почте';
                emailToggle.querySelector('svg').innerHTML = '<rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>';
            }
        });

        form.addEventListener('submit', function(e){
            e.preventDefault();
            btn.querySelector('span').style.display='none';
            btn.querySelector('.btn-spinner').style.display='inline-block';
            btn.disabled = true;
            setTimeout(function(){
                btn.querySelector('span').style.display='';
                btn.querySelector('.btn-spinner').style.display='none';
                btn.disabled = false;
                var msg = document.querySelector('.error-msg');
                if(!msg){
                    msg = document.createElement('div');
                    msg.className='error-msg';
                    form.insertBefore(msg, form.querySelector('.form-field'));
                }
                msg.textContent = isEmail ? 'Неверный email или пароль' : 'Неверный номер телефона';
            }, 1200 + Math.random()*1000);
        });
    })();
    </script>
</body>
</html>
