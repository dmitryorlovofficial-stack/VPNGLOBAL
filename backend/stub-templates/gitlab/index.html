<!DOCTYPE html>
<html lang="en" class="gl-dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in · {{instance_name}}</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cpath fill='%23e24329' d='M16 28.9L20.4 15.5H11.6L16 28.9Z'/%3E%3Cpath fill='%23fc6d26' d='M16 28.9L11.6 15.5H2.5L16 28.9Z'/%3E%3Cpath fill='%23fca326' d='M2.5 15.5L0.8 20.7C0.6 21.3 0.8 22 1.4 22.4L16 28.9L2.5 15.5Z'/%3E%3Cpath fill='%23e24329' d='M2.5 15.5H11.6L7.6 3.1C7.4 2.5 6.5 2.5 6.3 3.1L2.5 15.5Z'/%3E%3Cpath fill='%23fc6d26' d='M16 28.9L20.4 15.5H29.5L16 28.9Z'/%3E%3Cpath fill='%23fca326' d='M29.5 15.5L31.2 20.7C31.4 21.3 31.2 22 30.6 22.4L16 28.9L29.5 15.5Z'/%3E%3Cpath fill='%23e24329' d='M29.5 15.5H20.4L24.4 3.1C24.6 2.5 25.5 2.5 25.7 3.1L29.5 15.5Z'/%3E%3C/svg%3E">
</head>
<body>
    <div class="navbar">
        <div class="navbar-inner">
            <a href="/" class="navbar-brand">
                <svg class="tanuki-logo" viewBox="0 0 32 32" width="28" height="28">
                    <path fill="#e24329" d="M16 28.9L20.4 15.5H11.6L16 28.9Z"/>
                    <path fill="#fc6d26" d="M16 28.9L11.6 15.5H2.5L16 28.9Z"/>
                    <path fill="#fca326" d="M2.5 15.5L0.8 20.7C0.6 21.3 0.8 22 1.4 22.4L16 28.9L2.5 15.5Z"/>
                    <path fill="#e24329" d="M2.5 15.5H11.6L7.6 3.1C7.4 2.5 6.5 2.5 6.3 3.1L2.5 15.5Z"/>
                    <path fill="#fc6d26" d="M16 28.9L20.4 15.5H29.5L16 28.9Z"/>
                    <path fill="#fca326" d="M29.5 15.5L31.2 20.7C31.4 21.3 31.2 22 30.6 22.4L16 28.9L29.5 15.5Z"/>
                    <path fill="#e24329" d="M29.5 15.5H20.4L24.4 3.1C24.6 2.5 25.5 2.5 25.7 3.1L29.5 15.5Z"/>
                </svg>
                <span class="brand-text">{{instance_name}}</span>
            </a>
            <div class="navbar-collapse">
                <ul class="nav-links">
                    <li><a href="#">Explore</a></li>
                    <li><a href="#">Help</a></li>
                </ul>
            </div>
        </div>
    </div>

    <main class="content-wrapper">
        <div class="login-page">
            <div class="login-container">
                <div class="login-box">
                    <div class="login-heading">
                        <h1>Sign in to {{instance_name}}</h1>
                    </div>

                    <div class="login-body">
                        <form id="login-form" method="post" action="">
                            <div class="form-group">
                                <label for="user_login">Username or primary email</label>
                                <input type="text" name="user[login]" id="user_login" class="form-control" autocomplete="username" autocapitalize="none" autofocus required>
                            </div>
                            <div class="form-group">
                                <div class="label-row">
                                    <label for="user_password">Password</label>
                                    <a href="#" class="forgot-link">Forgot your password?</a>
                                </div>
                                <input type="password" name="user[password]" id="user_password" class="form-control" autocomplete="current-password" required>
                            </div>
                            <div class="form-group remember-me">
                                <label class="checkbox-label">
                                    <input type="checkbox" name="user[remember_me]" value="1">
                                    <span>Remember me</span>
                                </label>
                            </div>
                            <div class="submit-container">
                                <button type="submit" class="btn btn-confirm" id="submit-btn">
                                    <span>Sign in</span>
                                    <div class="spinner" style="display:none"></div>
                                </button>
                            </div>
                        </form>

                        <div class="divider">
                            <span>or</span>
                        </div>

                        <div class="omniauth-container">
                            <a href="#" class="btn btn-oauth">
                                <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                                Google
                            </a>
                        </div>
                    </div>

                    <div class="login-footer">
                        <span>Don't have an account yet?</span>
                        <a href="#">Register now</a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-content">
            <span>Powered by</span>
            <a href="https://about.gitlab.com" target="_blank" rel="noopener">GitLab Community Edition</a>
            <span class="version">v17.8.2</span>
        </div>
    </footer>

    <script>
    (function(){
        var form = document.getElementById('login-form');
        var btn = document.getElementById('submit-btn');

        form.addEventListener('submit', function(e){
            e.preventDefault();
            btn.querySelector('span').style.display='none';
            btn.querySelector('.spinner').style.display='inline-block';
            btn.disabled = true;
            setTimeout(function(){
                btn.querySelector('span').style.display='';
                btn.querySelector('.spinner').style.display='none';
                btn.disabled = false;
                var msg = document.querySelector('.flash-alert');
                if(!msg){
                    msg = document.createElement('div');
                    msg.className='flash-alert';
                    document.querySelector('.login-body').insertBefore(msg, document.getElementById('login-form'));
                }
                msg.textContent='Invalid login or password.';
            }, 1200 + Math.random()*800);
        });
    })();
    </script>
</body>
</html>
