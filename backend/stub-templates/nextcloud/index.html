<!DOCTYPE html>
<html lang="en" data-theme="default">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{instance_name}} — Log in</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='50' fill='%230082c9'/%3E%3C/svg%3E">
</head>
<body>
    <div id="header">
        <div class="header-appname-container">
            <a href="/" class="header-title">
                <div class="logo">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 262 48" width="160">
                        <path fill="#fff" d="M35.3 24c0 6.2-5 11.3-11.3 11.3S12.8 30.2 12.8 24 17.8 12.8 24 12.8 35.3 17.8 35.3 24zm-5.6 0c0-3.1-2.5-5.6-5.6-5.6S18.4 20.9 18.4 24s2.5 5.6 5.6 5.6 5.6-2.5 5.6-5.6zM0 24c0 13.3 10.7 24 24 24s24-10.7 24-24S37.3 0 24 0 0 10.7 0 24zm5.6 0C5.6 13.8 13.8 5.6 24 5.6S42.4 13.8 42.4 24 34.2 42.4 24 42.4 5.6 34.2 5.6 24z"/>
                        <path fill="#fff" d="M68.4 37.4V24.1c0-4.2-2.1-6.5-5.7-6.5-3.7 0-6 2.5-6 6.5v13.3h-4.5V14.2h4.3v2.6c1.8-2 4.2-3.1 7-3.1 5.7 0 9.4 3.8 9.4 10.1v13.6h-4.5zm17.7.5c-7 0-11.9-5.1-11.9-12.1s4.9-12.1 11.7-12.1c5 0 8.4 2.6 9.9 6l-4 1.8c-1-2.3-3.2-3.7-5.9-3.7-4.2 0-7.2 3.2-7.2 8s3 8 7.3 8c2.6 0 5-1.3 6-3.9l4 1.8c-1.7 3.8-5.5 6.2-9.9 6.2zm25.6-10.1l-6 6.4v3.2h-4.5V5.4h4.5v22.8l10.4-13.9h5.4L112.7 25l9.4 12.4h-5.2l-5.2-10.6zm18.7 10c-3.4 0-5.5-2.3-5.5-5.5V18h-3.5v-3.7h3.5V8.9h4.5v5.4h5.1V18h-5.1v13.3c0 1.7.7 2.3 2.1 2.3h3v3.8h-4.1zm20.4.1c-7.2 0-12-5.1-12-12.1s4.8-12.1 12-12.1 12 5.1 12 12.1-4.8 12.1-12 12.1zm0-4.2c4.2 0 7.4-3.2 7.4-7.9s-3.2-7.9-7.4-7.9-7.4 3.2-7.4 7.9 3.2 7.9 7.4 7.9zm28.2 4.1c-3.1 0-5.5-1.3-7-3.2v3h-4.3V5.4h4.5v11.5c1.6-2.1 4.1-3.2 6.8-3.2 6.6 0 11.1 5.1 11.1 12.1s-4.5 12.1-11.1 12.1zm-.5-20c-4.3 0-7 3.4-7 7.9s2.7 7.9 7 7.9c4.2 0 7-3.3 7-7.9s-2.8-7.9-7-7.9zm16.3 19.6V5.4h4.5v32h-4.5zm19.3.5c-7.2 0-12-5.1-12-12.1s4.8-12.1 12-12.1 12 5.1 12 12.1-4.8 12.1-12 12.1zm0-4.2c4.2 0 7.4-3.2 7.4-7.9s-3.2-7.9-7.4-7.9-7.4 3.2-7.4 7.9 3.2 7.9 7.4 7.9zm28.3 4.2c-3.1 0-5.5-1.3-7-3.2v3h-4.3V5.4h4.5v11.5c1.5-2.1 4-3.2 6.8-3.2 6.6 0 11.1 5.1 11.1 12.1s-4.5 12.1-11.1 12.1zm-.6-20c-4.3 0-7 3.4-7 7.9s2.7 7.9 7 7.9c4.2 0 7-3.3 7-7.9s-2.8-7.9-7-7.9z"/>
                    </svg>
                </div>
            </a>
        </div>
    </div>

    <main id="content">
        <div class="login-wrapper">
            <h1>Log in to {{instance_name}}</h1>
            <form method="post" action="" id="login-form">
                <fieldset>
                    <div class="input-wrapper">
                        <input type="text" name="user" id="user" placeholder="Username or email" autocomplete="username" autocapitalize="none" spellcheck="false" required autofocus>
                        <label for="user" class="infield">Username or email</label>
                    </div>
                    <div class="input-wrapper">
                        <input type="password" name="password" id="password" placeholder="Password" autocomplete="current-password" required>
                        <label for="password" class="infield">Password</label>
                        <button type="button" class="toggle-password" aria-label="Toggle password visibility">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        </button>
                    </div>
                    <div class="submit-wrapper">
                        <button type="submit" class="primary" id="submit-btn">
                            <span>Log in</span>
                            <div class="loading-spinner" style="display:none"></div>
                        </button>
                    </div>
                </fieldset>
            </form>
            <div class="alternative-logins">
                <a href="#" class="lost-password">Forgot password?</a>
            </div>
        </div>

        <div class="legal-notice">
            <p>{{instance_url}}</p>
        </div>
    </main>

    <footer role="contentinfo">
        <p class="info">
            <a href="https://nextcloud.com" target="_blank" rel="noopener noreferrer">Nextcloud Hub 9 (30.0.4)</a>
        </p>
    </footer>

    <script>
    (function(){
        var form = document.getElementById('login-form');
        var btn = document.getElementById('submit-btn');
        var pw = document.getElementById('password');
        var toggle = document.querySelector('.toggle-password');

        if(toggle){
            toggle.addEventListener('click', function(){
                pw.type = pw.type === 'password' ? 'text' : 'password';
            });
        }

        form.addEventListener('submit', function(e){
            e.preventDefault();
            btn.querySelector('span').style.display='none';
            btn.querySelector('.loading-spinner').style.display='inline-block';
            btn.disabled = true;
            setTimeout(function(){
                btn.querySelector('span').style.display='';
                btn.querySelector('.loading-spinner').style.display='none';
                btn.disabled = false;
                var msg = document.querySelector('.error-msg');
                if(!msg){
                    msg = document.createElement('div');
                    msg.className='error-msg';
                    form.insertBefore(msg, form.firstChild);
                }
                msg.textContent = 'Wrong username or password.';
            }, 1500 + Math.random()*1000);
        });
    })();
    </script>
</body>
</html>
